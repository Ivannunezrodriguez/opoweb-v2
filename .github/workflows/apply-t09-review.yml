name: Aplicar revisión del tema 9
on:
  push:
    branches: [rebuild/puebla-tema-09-v1]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-09-v1
      - name: Actualizar programa y validación
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('data/programa.json')
          data=json.loads(p.read_text())
          t=data['temas'][8]
          t.update({
            'estado':'EN_REVISION_USUARIO',
            'manual':'content/la-puebla/tema-09/manual.md',
            'matriz':'content/la-puebla/tema-09/matriz.json',
            'feedback':'content/la-puebla/tema-09/feedback.md',
            'preguntas':'content/la-puebla/tema-09/preguntas.json',
            'trazabilidad':'content/la-puebla/tema-09/articulos.md'
          })
          p.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n')
          v=Path('tests/validate.mjs')
          s=v.read_text()
          s=s.replace("assert.deepEqual(inReview, []);", "assert.deepEqual(inReview.map(item => item.numero), [9]);")
          s=s.replace("assert.equal(pending.length, 11, 'Los temas 9-19 deben permanecer pendientes');", "assert.equal(pending.length, 10, 'Los temas 10-19 deben permanecer pendientes');")
          s=s.replace("assert.ok(programme.temas.slice(8).every(item => !item.manual && !item.preguntas));", "assert.ok(programme.temas.slice(9).every(item => !item.manual && !item.preguntas));")
          insert="""
const manual9 = read('content/la-puebla/tema-09/manual.md');
const matrix9 = json('content/la-puebla/tema-09/matriz.json');
const questions9 = json('content/la-puebla/tema-09/preguntas.json');
const articles9 = read('content/la-puebla/tema-09/articulos.md');
assert.equal(matrix9.estado, 'EN_REVISION_USUARIO');
assert.equal(matrix9.cobertura.length, 8);
assert.equal(questions9.estado, 'NO_CREADAS_HASTA_APROBACION_TEORICA');
assert.deepEqual(questions9.preguntas, []);
assert.ok(manual9.includes('**Estado:** EN REVISIÓN DEL USUARIO'));
assert.ok(manual9.includes('Tema cerrado: **NO**'));
assert.ok(manual9.includes('27 de diciembre de 2025'));
assert.ok(manual9.includes('Artículo **53 bis**'));
for (let article = 1; article <= 97; article += 1) assert.ok(articles9.includes(`| ${article} |`));
assert.ok(serviceWorker.includes("const CACHE = 'opoweb-v2-0.8.0'"));
assert.ok(!serviceWorker.includes('tema-09/manual.md'));
"""
          s=s.replace("assert.ok(rules.includes('Te prometí un manual y publiqué resúmenes inflados por métricas'));",insert+"\nassert.ok(rules.includes('Te prometí un manual y publiqué resúmenes inflados por métricas'));")
          s=s.replace("status: 'TEMA_8_APROBADO_VALIDADO'", "status: 'TEMA_9_EN_REVISION_VALIDADO'")
          v.write_text(s)
          PY
      - name: Guardar cambios
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/programa.json tests/validate.mjs
          git commit -m "Poner tema 9 en revisión [skip ci]"
          git push origin HEAD:rebuild/puebla-tema-09-v1
