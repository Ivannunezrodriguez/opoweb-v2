name: Corregir plazo Tema 6

on:
  push:
    paths:
      - '.github/workflows/fix-tema6-interinidad.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  corregir:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Corregir plazo legal
        shell: python
        run: |
          from pathlib import Path

          path = Path('content/la-puebla/tema-06/manual.md')
          text = path.read_text(encoding='utf-8')

          replacements = {
              'Duración máxima del programa: **cuatro años**.': 'Duración máxima del programa: **dos años**.',
              '| Programa temporal de interino | Máximo 4 años |': '| Programa temporal de interino | Máximo 2 años |',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'No se encontró el texto esperado: {old}')
              text = text.replace(old, new)

          focus = '> ⚠️ **¡Foco Examen!:** El nombramiento por programa temporal puede prorrogarse cuando el inicial sea inferior, pero la duración total nunca puede superar **dos años**.'
          anchor = 'Puede prorrogarse sin superar ese máximo total.'
          if focus not in text:
              text = text.replace(anchor, anchor + '\n\n' + focus)

          path.write_text(text, encoding='utf-8')

      - name: Confirmar que no queda la cifra incorrecta
        run: |
          ! grep -n "Programa temporal de interino | Máximo 4 años" content/la-puebla/tema-06/manual.md
          ! grep -n "Duración máxima del programa: \*\*cuatro años\*\*" content/la-puebla/tema-06/manual.md
          grep -n "Duración máxima del programa: \*\*dos años\*\*" content/la-puebla/tema-06/manual.md

      - name: Publicar corrección
        run: |
          git config user.name "opoweb-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/la-puebla/tema-06/manual.md
          git commit -m "Corrige a dos años la interinidad por programa temporal"
          git push
