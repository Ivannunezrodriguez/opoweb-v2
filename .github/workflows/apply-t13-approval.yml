name: Aplicar aprobación Tema 13

on:
  push:
    branches:
      - rebuild/puebla-tema-13

permissions:
  contents: write

jobs:
  publish:
    if: github.event.head_commit.message != 'Publicar Tema 13 aprobado'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-13
          fetch-depth: 0

      - name: Aplicar aprobación expresa
        run: python scripts/publish_t13.py

      - name: Validar repositorio
        run: npm test

      - name: Confirmar publicación
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publicar Tema 13 aprobado"
          git push origin HEAD:rebuild/puebla-tema-13
