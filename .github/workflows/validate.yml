name: Validar y publicar aprobación del tema 10

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  approve-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-10
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Aplicar aprobación expresa
        run: python scripts/approve_t10.py
      - name: Restaurar flujo normal y retirar mecanismo temporal
        run: |
          cat > .github/workflows/validate.yml <<'EOF'
          name: Validar OpoWeb v2

          on:
            pull_request:
              branches: [main]
            push:
              branches: [main]

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 24
                - name: Comprobar sintaxis
                  run: node --check assets/app.js
                - name: Validar programa, estados y manual aprobado
                  run: npm test
          EOF
          rm scripts/approve_t10.py
      - name: Comprobar sintaxis
        run: node --check assets/app.js
      - name: Validar resultado final
        run: npm test
      - name: Guardar publicación validada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publicar tema 10 aprobado"
          git push origin HEAD:rebuild/puebla-tema-10
