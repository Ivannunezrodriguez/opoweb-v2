name: Diagnosticar publicación del tema 9

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'rebuild/puebla-tema-09-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-09-v1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Corregir generador y aplicar cambios temporales
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/approve-t09.py')
          text = path.read_text(encoding='utf-8')
          old = r"assert.ok(manual9.split('\n').length > 350"
          new = r"assert.ok(manual9.split('\\n').length > 350"
          if old not in text:
              raise SystemExit('No se encontró el escape que debía corregirse')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python scripts/approve-t09.py
          rm -f .github/workflows/apply-t09-approval.yml
          rm -f scripts/approve-t09.py
      - name: Ejecutar pruebas y guardar salida
        run: |
          set +e
          npm test > test-output.txt 2>&1
          echo $? > test-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: tema-09-test-output-2
          path: |
            test-output.txt
            test-status.txt
      - name: Marcar fallo si procede
        run: test "$(cat test-status.txt)" = "0"
