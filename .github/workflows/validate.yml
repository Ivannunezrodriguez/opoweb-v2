name: Validar OpoWeb v2

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Comprobar sintaxis
        run: node --check assets/app.js
      - name: Validar programa, estados y manual aprobado
        run: npm test
