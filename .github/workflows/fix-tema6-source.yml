name: Corregir fuente Tema 6

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-tema6-source.yml'

permissions:
  contents: write

jobs:
  fix-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Corregir manual y retirar parche transitorio
        run: |
          python - <<'PY'
          from pathlib import Path

          manual = Path('content/la-puebla/tema-06/manual.md')
          text = manual.read_text(encoding='utf-8')
          old = '''### C. Programa temporal

Debe tratarse de actividades no habituales o lanzamiento de una nueva actividad.

Duración máxima del programa: **dos años**.

Puede prorrogarse sin superar ese máximo total.

> ⚠️ **¡Foco Examen!:** El nombramiento por programa temporal puede prorrogarse cuando el inicial sea inferior, pero la duración total nunca puede superar **dos años**.'''
          new = '''### C. Programa temporal

Debe tratarse de actividades no habituales o lanzamiento de una nueva actividad.

El TREBEP fija una duración máxima básica de **tres años** y permite que la legislación autonómica la amplíe hasta **doce meses más**. La Ley 4/2011 de Castilla-La Mancha establece para estos programas una duración máxima total de **cuatro años**.

Puede prorrogarse cuando el nombramiento inicial sea inferior, sin superar el máximo total de **cuatro años**.

> ⚠️ **¡Foco Examen!:** No confundas los **dos años de servicio activo** exigidos para determinados supuestos de promoción interna con la duración máxima del programa temporal de interinidad. En Castilla-La Mancha, el máximo total es de **cuatro años**.'''
          if old not in text:
              raise SystemExit('No se encontró el bloque exacto que debía corregirse')
          manual.write_text(text.replace(old, new, 1), encoding='utf-8')

          index = Path('index.html')
          index_text = index.read_text(encoding='utf-8')
          index.write_text(index_text.replace('  <script type="module" src="assets/tema6-interinidad-correction.js"></script>\n', ''), encoding='utf-8')

          sw = Path('sw.js')
          sw_text = sw.read_text(encoding='utf-8')
          sw_text = sw_text.replace("const CACHE = 'opoweb-v2-0.21.8';", "const CACHE = 'opoweb-v2-0.21.9';")
          sw_text = sw_text.replace("  './assets/tema6-interinidad-correction.js',\n", '')
          sw.write_text(sw_text, encoding='utf-8')

          validator = Path('tests/validate.mjs')
          validator_text = validator.read_text(encoding='utf-8')
          validator_text = validator_text.replace("assert.ok(index.includes('assets/tema6-interinidad-correction.js'));\n", "assert.ok(!index.includes('assets/tema6-interinidad-correction.js'));\n")
          validator_text = validator_text.replace("assert.ok(serviceWorker.includes(\"const CACHE = 'opoweb-v2-0.21.8'\"));", "assert.ok(serviceWorker.includes(\"const CACHE = 'opoweb-v2-0.21.9'\"));")
          validator_text = validator_text.replace("  './assets/tema6-interinidad-correction.js',\n", '')
          validator_text = validator_text.replace("tema6Interinidad: '4_YEARS_RUNTIME_CORRECTION_VALIDATED',\n  sourceCorrectionPending: true,", "tema6Interinidad: '4_YEARS_SOURCE_VALIDATED',\n  sourceCorrectionPending: false,")
          validator.write_text(validator_text, encoding='utf-8')

          status = Path('AUDIT_STATUS.md')
          status_text = status.read_text(encoding='utf-8')
          status_text = status_text.replace('El Markdown fuente de `content/la-puebla/tema-06/manual.md` conserva todavía la cifra errónea en el apartado 11.C. La interfaz pública aplica de forma transitoria `assets/tema6-interinidad-correction.js`, que corrige únicamente ese subapartado y mantiene intactos los **dos años de servicio activo** exigidos en promoción interna. Hasta sustituir el Markdown fuente, debe prevalecer también `content/la-puebla/tema-06/auditoria-2026-07-18.md`.', 'El Markdown fuente de `content/la-puebla/tema-06/manual.md` ya incorpora el régimen correcto: máximo básico estatal de **tres años**, ampliable hasta **doce meses más**, y máximo total de **cuatro años** en Castilla-La Mancha. Se mantiene intacta la referencia distinta a los **dos años de servicio activo** exigidos en promoción interna.')
          status_text = status_text.replace('La caché vigente del servicio es `opoweb-v2-0.21.8`', 'La caché vigente del servicio es `opoweb-v2-0.21.9`')
          status_text = status_text.replace('1. Sustituir directamente en `content/la-puebla/tema-06/manual.md` el bloque erróneo sobre programas temporales.\n2. Retirar después `assets/tema6-interinidad-correction.js` de la interfaz y de la caché.\n3.', '1.')
          status.write_text(status_text, encoding='utf-8')
          PY
      - name: Eliminar módulo transitorio
        run: rm -f assets/tema6-interinidad-correction.js
      - name: Confirmar cambios
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add content/la-puebla/tema-06/manual.md index.html sw.js tests/validate.mjs AUDIT_STATUS.md assets/tema6-interinidad-correction.js
          git commit -m 'Corrige definitivamente la interinidad del Tema 6 en la fuente'
          git push
