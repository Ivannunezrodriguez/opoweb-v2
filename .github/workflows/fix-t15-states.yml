name: Corregir estados Tema 15

on:
  push:
    branches:
      - fix/tema-15-estados

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/tema-15-estados
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/fix_t15_states.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/la-puebla/tema-15
          git commit -m "Corregir estados visibles del Tema 15" || exit 0
          git push
