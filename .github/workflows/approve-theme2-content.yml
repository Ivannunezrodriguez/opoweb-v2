name: Aplicar aprobación del tema 2

on:
  push:
    branches: [rebuild/puebla-tema-02]

permissions:
  contents: write

jobs:
  approve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-02
      - name: Actualizar metadatos del manual
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('content/la-puebla/tema-02/manual.md')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '**Estado:** EN REVISIÓN DEL USUARIO  ': '**Estado:** APROBADO POR EL USUARIO  ',
              '**No publicado como tema aprobado.**  ': '**Publicado en OpoWeb v2 tras aprobación expresa del usuario.**  ',
              '- Revisión del usuario: pendiente.': '- Revisión del usuario: **aprobada el 17 de julio de 2026**.',
              '- Tema cerrado: **NO**.': '- Tema cerrado: **SÍ, aprobado por el usuario**.',
              '- Publicación como aprobado: **NO**.': '- Publicación como aprobado: **SÍ**.',
              'El tema solo cambiará a `APROBADO_USUARIO` tras una respuesta expresa: **«Tema 2 aprobado»**.': 'El usuario aprobó expresamente el tema mediante la respuesta **«Tema 2 aprobado»** el 17 de julio de 2026.'
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'No se encontró el texto esperado: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Guardar actualización
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add content/la-puebla/tema-02/manual.md
          git commit -m "Cerrar manual del tema 2 tras aprobación [skip ci]"
          git push origin HEAD:rebuild/puebla-tema-02
