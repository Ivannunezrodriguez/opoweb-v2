name: Aplicar aprobación del tema 9

on:
  push:
    branches: [rebuild/puebla-tema-09-v1]

permissions:
  contents: write

jobs:
  approve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-09-v1

      - name: Cerrar y publicar el tema 9
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'No se encontró el texto esperado en {label}: {old!r}')
              return text.replace(old, new, 1)

          # Manual
          manual_path = Path('content/la-puebla/tema-09/manual.md')
          manual = manual_path.read_text(encoding='utf-8')
          replacements = [
              ('**Estado:** EN REVISIÓN DEL USUARIO  ', '**Estado:** APROBADO POR EL USUARIO  '),
              ('**No publicado como tema aprobado.**  ', '**Publicado en OpoWeb v2 tras aprobación expresa del usuario.**  '),
              ('- Revisión del usuario: pendiente.', '- Revisión del usuario: **aprobada el 17 de julio de 2026**.'),
              ('- Tema cerrado: **NO**.', '- Tema cerrado: **SÍ, aprobado por el usuario**.'),
              ('- Publicación como aprobado: **NO**.', '- Publicación como aprobado: **SÍ**.'),
              ('El tema solo cambiará a `APROBADO_USUARIO` tras la respuesta expresa **«Tema 9 aprobado»**.', 'El usuario aprobó expresamente el tema mediante la respuesta **«Tema 9 aprobado»** el 17 de julio de 2026.')
          ]
          for old, new in replacements:
              manual = replace_once(manual, old, new, 'manual')
          manual_path.write_text(manual, encoding='utf-8')

          # Trazabilidad
          articles_path = Path('content/la-puebla/tema-09/articulos.md')
          articles = articles_path.read_text(encoding='utf-8')
          articles = replace_once(articles, '**Estado:** EN REVISIÓN DEL USUARIO', '**Estado:** APROBADO POR EL USUARIO', 'articulos')
          articles_path.write_text(articles + ('\n' if not articles.endswith('\n') else ''), encoding='utf-8')

          # Matriz
          matrix_path = Path('content/la-puebla/tema-09/matriz.json')
          matrix = json.loads(matrix_path.read_text(encoding='utf-8'))
          matrix['estado'] = 'APROBADO_USUARIO'
          matrix['aprobadoEl'] = '2026-07-17'
          matrix['criterioDeCierre'] = 'Aprobado expresamente por el usuario mediante la respuesta Tema 9 aprobado.'
          matrix_path.write_text(json.dumps(matrix, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          # Preguntas: permanecen vacías
          questions_path = Path('content/la-puebla/tema-09/preguntas.json')
          questions = json.loads(questions_path.read_text(encoding='utf-8'))
          questions['estado'] = 'PENDIENTE_REVISION_POST_APROBACION'
          questions['nota'] = 'El manual está aprobado. Las preguntas siguen vacías hasta una revisión específica y trazable por artículo.'
          questions_path.write_text(json.dumps(questions, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          # Constancia de aprobación
          approval = '''# La Puebla de Montalbán · Tema 9 · Aprobación del usuario

- **Respuesta literal:** «Tema 9 aprobado».
- **Fecha:** 17 de julio de 2026.
- **Estado resultante:** `APROBADO_USUARIO`.
- **Publicación:** autorizada en OpoWeb v2.

## Alcance aprobado

- Ley Orgánica 3/2018, artículos 1–97 y artículo 53 bis.
- RGPD como complemento imprescindible.
- Aplicación municipal, principios, derechos, tratamientos concretos, responsables, encargado, DPD, AEPD, procedimientos, infracciones, sanciones y derechos digitales.
- Trazabilidad individual del articulado.

La aprobación del manual no autoriza la generación automática de preguntas. El banco permanece vacío hasta su revisión específica.
'''
          Path('content/la-puebla/tema-09/aprobacion.md').write_text(approval, encoding='utf-8')

          # Programa
          programme_path = Path('data/programa.json')
          programme = json.loads(programme_path.read_text(encoding='utf-8'))
          programme['version'] = '0.9.0'
          programme['updatedAt'] = '2026-07-17'
          theme = programme['temas'][8]
          theme.clear()
          theme.update({
              'numero': 9,
              'titulo': 'La Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales.',
              'estado': 'APROBADO_USUARIO',
              'aprobadoEl': '2026-07-17',
              'manual': 'content/la-puebla/tema-09/manual.md',
              'matriz': 'content/la-puebla/tema-09/matriz.json',
              'aprobacion': 'content/la-puebla/tema-09/aprobacion.md',
              'preguntas': 'content/la-puebla/tema-09/preguntas.json',
              'trazabilidad': 'content/la-puebla/tema-09/articulos.md'
          })
          programme_path.write_text(json.dumps(programme, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          # Versión de paquete e interfaz
          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['version'] = '0.9.0'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          index = replace_once(index, 'v0.8.0', 'v0.9.0', 'index')
          index_path.write_text(index, encoding='utf-8')

          # PWA
          sw_path = Path('sw.js')
          sw = sw_path.read_text(encoding='utf-8')
          sw = replace_once(sw, "const CACHE = 'opoweb-v2-0.8.0';", "const CACHE = 'opoweb-v2-0.9.0';", 'sw')
          anchor = "  './content/la-puebla/tema-08/articulos.md'\n];"
          addition = "  './content/la-puebla/tema-08/articulos.md',\n  './content/la-puebla/tema-09/manual.md',\n  './content/la-puebla/tema-09/matriz.json',\n  './content/la-puebla/tema-09/aprobacion.md',\n  './content/la-puebla/tema-09/preguntas.json',\n  './content/la-puebla/tema-09/articulos.md'\n];"
          sw = replace_once(sw, anchor, addition, 'sw assets')
          sw_path.write_text(sw, encoding='utf-8')

          # README
          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          for old, new in [
              ('- Versión: **0.8.0**.', '- Versión: **0.9.0**.'),
              ('- Temas 1–8: `APROBADO_USUARIO` el 17 de julio de 2026.', '- Temas 1–9: `APROBADO_USUARIO` el 17 de julio de 2026.'),
              ('- Temas 9–19: `PENDIENTE_RECONSTRUCCION`.', '- Temas 10–19: `PENDIENTE_RECONSTRUCCION`.'),
              ('│     └─ tema-08/\n│        ├─ manual.md', '│     ├─ tema-08/\n│     └─ tema-09/\n│        ├─ manual.md'),
              ('Los bancos de preguntas de los ocho temas permanecen vacíos', 'Los bancos de preguntas de los nueve temas permanecen vacíos'),
              ('La validación confirma que existen exactamente ocho temas aprobados, que los otros once no contienen teoría heredada', 'La validación confirma que existen exactamente nueve temas aprobados, que los otros diez no contienen teoría heredada')
          ]:
              readme = replace_once(readme, old, new, 'README')
          theme9_section = '''### Tema 9

Ley Orgánica 3/2018 de Protección de Datos Personales y garantía de los derechos digitales: principios, bases jurídicas, derechos, tratamientos específicos, responsable, encargado, DPD, AEPD, procedimientos, infracciones, régimen de las Administraciones públicas y derechos digitales. Incluye el RGPD como complemento imprescindible y trazabilidad de los artículos 1–97 y 53 bis.

'''
          readme = replace_once(readme, 'Los bancos de preguntas de los nueve temas permanecen vacíos', theme9_section + 'Los bancos de preguntas de los nueve temas permanecen vacíos', 'README tema 9')
          readme_path.write_text(readme, encoding='utf-8')

          # Validación
          test_path = Path('tests/validate.mjs')
          test = test_path.read_text(encoding='utf-8')
          for old, new in [
              ("assert.equal(programme.version, '0.8.0');", "assert.equal(programme.version, '0.9.0');"),
              ("assert.equal(packageJson.version, '0.8.0');", "assert.equal(packageJson.version, '0.9.0');"),
              ("assert.ok(index.includes('v0.8.0'));", "assert.ok(index.includes('v0.9.0'));"),
              ('assert.deepEqual(approved.map(item => item.numero), [1, 2, 3, 4, 5, 6, 7, 8]);', 'assert.deepEqual(approved.map(item => item.numero), [1, 2, 3, 4, 5, 6, 7, 8, 9]);'),
              ("assert.equal(pending.length, 11, 'Los temas 9-19 deben permanecer pendientes');", "assert.equal(pending.length, 10, 'Los temas 10-19 deben permanecer pendientes');"),
              ('assert.ok(programme.temas.slice(8).every(item => !item.manual && !item.preguntas));', 'assert.ok(programme.temas.slice(9).every(item => !item.manual && !item.preguntas));'),
              ('const expectedRows = { 1: 6, 2: 5, 3: 9, 4: 7, 5: 8, 6: 6, 7: 7, 8: 8 };', 'const expectedRows = { 1: 6, 2: 5, 3: 9, 4: 7, 5: 8, 6: 6, 7: 7, 8: 8, 9: 8 };'),
              ('const minimumLines = theme.numero === 7 ? 350 : 500;', 'const minimumLines = [7, 9].includes(theme.numero) ? 350 : 500;'),
              ("assert.ok(serviceWorker.includes(\"const CACHE = 'opoweb-v2-0.8.0'\"));", "assert.ok(serviceWorker.includes(\"const CACHE = 'opoweb-v2-0.9.0'\"));"),
              ('for (const number of [1, 2, 3, 4, 5, 6, 7, 8]) {', 'for (const number of [1, 2, 3, 4, 5, 6, 7, 8, 9]) {'),
              ("  '.github/workflows/apply-t08-approval.yml'", "  '.github/workflows/apply-t08-approval.yml',\n  '.github/workflows/apply-t09-approval.yml'"),
              ('  theme8Questions: questions8.preguntas.length,\n  theme8ManualLines: manual8.split(\'\\n\').length,\n  tracedRegionalArticles: 65,\n  tracedOrganicArticles: 78,\n  status: \'TEMA_8_APROBADO_VALIDADO\'', "  theme9Questions: questions9.preguntas.length,\n  theme9ManualLines: manual9.split('\\n').length,\n  tracedLopdgddArticles: 97,\n  status: 'TEMA_9_APROBADO_VALIDADO'")
          ]:
              test = replace_once(test, old, new, 'tests')

          theme9_checks = '''
const manual9 = read('content/la-puebla/tema-09/manual.md');
const matrix9 = json('content/la-puebla/tema-09/matriz.json');
const questions9 = json('content/la-puebla/tema-09/preguntas.json');
const approval9 = read('content/la-puebla/tema-09/aprobacion.md');
const articles9 = read('content/la-puebla/tema-09/articulos.md');
assert.equal(matrix9.tema, 9);
assert.equal(matrix9.estado, 'APROBADO_USUARIO');
assert.equal(matrix9.aprobadoEl, '2026-07-17');
assert.equal(matrix9.cobertura.length, 8);
assert.equal(programme.temas[8].trazabilidad, 'content/la-puebla/tema-09/articulos.md');
assert.equal(questions9.estado, 'PENDIENTE_REVISION_POST_APROBACION');
assert.deepEqual(questions9.preguntas, []);
assert.ok(approval9.includes('«Tema 9 aprobado»'));
assert.ok(manual9.includes('**Estado:** APROBADO POR EL USUARIO'));
assert.ok(manual9.includes('Tema cerrado: **SÍ, aprobado por el usuario**'));
assert.ok(manual9.includes('Publicación como aprobado: **SÍ**'));
assert.ok(manual9.includes('27 de diciembre de 2025'));
assert.ok(manual9.includes('Artículo **53 bis**'));
assert.ok(manual9.split('\n').length > 350, 'El manual del tema 9 parece truncado');
assert.ok(articles9.includes('**Estado:** APROBADO POR EL USUARIO'));
for (let article = 1; article <= 97; article += 1) {
  assert.ok(articles9.includes(`| ${article} |`), `Falta trazabilidad del artículo ${article} de la LOPDGDD`);
}
assert.ok(articles9.includes('| 53 bis |'));
for (const marker of [
  '14 años',
  'un mes',
  '72 horas',
  'diez días',
  'tres meses',
  'responsable',
  'encargado',
  'Delegado de Protección de Datos',
  'artículo 77',
  'desconexión digital',
  'Reglamento (UE) 2016/679'
]) assert.ok(manual9.toLowerCase().includes(marker.toLowerCase()), `Falta contenido crítico del tema 9: ${marker}`);
assert.ok(serviceWorker.includes('./content/la-puebla/tema-09/articulos.md'));

'''
          test = replace_once(test, "assert.ok(rules.includes('Te prometí un manual y publiqué resúmenes inflados por métricas'));", theme9_checks + "assert.ok(rules.includes('Te prometí un manual y publiqué resúmenes inflados por métricas'));", 'tests tema 9')
          test_path.write_text(test, encoding='utf-8')
          PY

      - name: Eliminar mecanismo temporal y guardar
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/apply-t09-approval.yml
          git add content/la-puebla/tema-09 data/programa.json package.json index.html sw.js README.md tests/validate.mjs
          git commit -m "Publicar tema 9 aprobado"
          git push origin HEAD:rebuild/puebla-tema-09-v1
