name: Aplicar aprobación Tema 18

on:
  push:
    branches:
      - rebuild/puebla-tema-18

permissions:
  contents: write

jobs:
  publish:
    if: github.event.head_commit.message != 'Publicar Tema 18 aprobado'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-18
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Aplicar aprobación
        run: python scripts/publish_t18.py

      - name: Validar publicación
        run: npm test

      - name: Publicar cambios en la rama
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publicar Tema 18 aprobado"
          git push origin HEAD:rebuild/puebla-tema-18
