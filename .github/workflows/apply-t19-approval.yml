name: Aplicar aprobación Tema 19

on:
  push:
    branches:
      - rebuild/puebla-tema-19

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/puebla-tema-19
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/publish_t19.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/la-puebla/tema-19 data/programa.json README.md package.json index.html sw.js tests/validate.mjs
          git commit -m "Publicar La Puebla · Tema 19 aprobado" || exit 0
          git push
